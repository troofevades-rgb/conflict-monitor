services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-conflict_monitor}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/conflict_monitor
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - telegram_sessions:/app/sessions

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    env_file: .env
    environment:
      VITE_MAPBOX_TOKEN: ${MAPBOX_TOKEN:-}
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  pgdata:
  telegram_sessions:
